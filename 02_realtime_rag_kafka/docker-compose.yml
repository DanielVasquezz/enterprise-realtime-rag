version: '3.7'

services:
  # 1. BROKER DE MENSAJES (Apache Kafka vía Redpanda)
  # Redpanda es 10x más rápido que Kafka tradicional, escrito en C++ y 100% compatible con la API de Kafka.
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: kafka_redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  # 2. BASE DE DATOS VECTORIAL (Qdrant)
  # Un motor en Rust especializado puramente en algoritmos para buscar vectores matemáticos hiperrápido.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  redpanda-data:
  qdrant-data:
